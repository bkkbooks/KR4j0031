body:
  text: 孏窟詞宋侯寘撰水調歌頭題嶽麓法華臺曉霧散晴渚秋色滿湘山青鞵黄㡌忺與名士共躋攀窈窕深林幽谷詰曲危亭飛觀俛首眎塵寰長嘯望天末餘響下雲端白鶴去荒井在汲清寒醒然毛骨浮丘招我御風還拂拭蒼崖苔蘚一寫胸中豪氣𣺌𣺌洞庭寛山鬼善呵䕶千載照層巒又上饒送程伯禹尚書凉吹送溪雨落日散汀鷗暮天空闊無際層巘緑蛾浮上印初辤藩寄拂袖欣還故里歸騎及中秋倚杖飽山閣回首翠微樓一區宅千里客舊從遊甘棠空有餘䕃誰解挽公留翰墨文章獨步富貴功名餘事當代仰風流暫蠟登山屐終作濟川舟又為鄭子禮提刑夀湘水照秋碧衡岳際天髙繡衣玉節清曉歡頌擁旌旄本是紫庭梁棟暫借雲臺耳目驛傳小遊遨五筦與三楚醲愛勝春醪埽欃槍蘇耄倪載弓櫜逺民流戀須信寰海荷甄陶坐享龜齡鶴算穏佩金魚玉帶常近赭黄袍嵗嵗秋月底沉醉紫檀槽又為張敬夫直閣夀天地孕冲氣霜雪實嘉平粹然經世材具應為聖時生妙處為仁受用顛倒縱横無壅一笑泮春氷袖手無一語四海已傾情紫岩老游戲事悟誠眀當年華夏髙仰玉振更金聲家有淵騫髙弟可但聞詩聞禮衣鉢要相承周扆絢餘彩商鼎味新羮瑞鶴仙送張丞罷官歸柯山楚山無際碧湛一溪晴緑四郊寒色霜華㺯初日有玉眀遥草金鋪平磧天涯倦翼更何堪臨岐送客念飛蓬斷梗無蹤把酒後期難覓愁寂梅花顦顇茅舍蕭疎倍添悽惻維舟岸側留君飲醉休惜想柯山春晩還家應對菊老松堅舊宅嘆宦游索寞情懐甚時去得又為劉信叔太尉夀溥天氛祲廓看慶綿鴻祚勛昭麟閣蕃宣換符鑰占西南襟帶遍闕油幙湘流繞郭藹一城和氣霧薄聽嘈嘈比屋歡聲共説吏閒民樂遥想薌霏鳬㬉翠擁屏深曉風傳樂瓊腴緩酌花隂淡柳絲弱任松凋鶴瘦蓮欹龜老丹頰常如舊渥趂天申去押西班奉觴御幄又詠含笑春風無檢束放倡條冶葉恣情丹緑闕鶯喧燕宿似東鄰北里都無貞淑髙情恨蹙歎何時重見桂菊又誰知天上黄姑埽盡晩春餘俗幽獨鉛華不御翡翠帷深鬱金裙簇長眉瞭目嫣然態倚脩竹縱青門瓜美江陵橘老怎比無窮賸馥最難禁扇底横枝惱人睡足滿江紅中秋上劉㳟甫舍人天闊江南秋未老空江澄碧江外月飛來千丈水天同色萬屋覆銀清不寐一城踏雪寒無跡況楚風連陌競張燈如元夕山獠静棠隂寂秋稼盛香醪直聽子城吹角青樓横笛君不見蘇仙翻醉墨一篇水調鏘金石念良辰美景賞心時誠難得又困頓春眠無情思夢魂飄泊簷外雨霏霏冉冉乍晴還落山黛四圍頻入眼柳絲一縷低縈閣念沈郎多感更傷春腰如削風入户香穿箔花似舊人非昨任遊蜂雙燕經營拂掠海闊錦魚傳不到洞深紫鳳期難約謾綵牋牙管倚西窗題紅藥又和徐叔至御帶重到西湖春拆信露花酥滴倚危欄湖山佳處短屏著色擬泛一舟蒼莽岸恐傷萬里羇游客賴款門修竹有髙人留狂迹傾葢意真相得詩句裏曽相識看戛然飛動筆端金石照眼光浮瓊液滿斷腸翠擁宫靴窄問多情還肯借青鸞通消息又再用韻老矣何堪隨處是春衫酒滴醉狂時一揮千字貝光玉色失意險為湘岸鬼浩歌又作長安客且乗流除却五侯門無車跡驚人句天外得醫國手塵中識問鼎槐何似卧雲歌石夢裏略無軒冕念眼前豈是江湖窄􅂸蠅頭蝸角去來休休姑息又和江亮采甚矣吾衰徒自苦飢腸為孽嗟寸禄區區留戀形疲心竭江湖一生真可羨塵埃永書何堪説似鈍刀終嵗斲空山寜無缺􅂸放浪休豪傑秋水漲歸期決儘鳬長鶴短任渠分别芒屩夜尋溪上酒葛巾曉挂松間月向丹霄傳語舊交游慵非拙水龍吟老人夀詞夜來霜拂簾旌深雲麗日開清曉香猊金煗氷壺玉嫰佳辰寒早橘緑橙黄袖紅帬翠一堂歡笑正梅妃月姊雪肌粉面爭粧㸃瀟湘好莫惜芳樽屢倒擁羣仙醉遊蓬島東床俊選南溟歸信一時俱到鬢影搖春命書紆錦子孫環繞看他時歸去飛觴石澗侍甘泉老多麗帝城春玉堂深處飛煙想聖人恩隆内職左璫押賜傳宣綵衣眀瑤觴膝下花晝永錦瑟樽前富貴從來功名餘事鼎彞勒遍筆如椽向中禁瑣窗偷覻王母語當年清平世衣冠是誰三世甘泉記年時翹才獻夀小詩曽涴苔牋望三槐雲霞交映照五彩衮繡相鮮當日非䛕如今方信門人稱頌是師言況自有兩宫醲眷卜夢亦徒然看指日鼎新化爐一氣陶甄念奴嬌和王聖俞滄浪萬頃厭塵纓手掬清流頻洗落日孤雲煙渚浄鷗沒澄波心裏一舸横秋兩橈開浪霜竹醒煩耳蕭蕭風露夢回月照船尾須信閒少忙多壺觴并賦詠莫辜雲水乗興前溪溪又轉隠約歸帆天際紅蓼丹楓黄蘆白竹總勝春桃李浮丘何在與君共誇琴鯉又競春臺榭媚東風迤邐繁紅成簇方霽溪南簾繡捲和氣充盈華屋金煗香彞玉鳴舞珮春笋調絲竹烏衣宴㑹逺追王謝髙躅藉甚四海聲名林泉活計未許翁知足日日江邊沙露静人徯東來雕轂八錦行持五禽游戲已受長生籙衮衣蟬冕最宜雙鬢凝緑又探梅衰翁憨甚向尊前手撚一枝寒玉想見梅臺花更好一片瓊田栖緑短轡輕輿大家同去取酒償醲馥元來春晩萬苞空間黄竹休恨雪小雲嬌出羣風韻已覺桃花俗羯鼔聲髙回笑臉怎得天公來促江上風平嶺南人逺誰度單于曲眀朝酒醒但餘詩興天兆風入松西湖戲作少年心醉杜韋娘曽格外疎狂錦箋預約西湖上共幽深竹院松窓愁夜黛眉顰翠惜歸羅帕分香重來一夢覺黄梁空煙水微茫如今眼底無姚魏記舊游凝竚凄凉入扇柳風殘酒㸃衣花雨斜陽又東樓煙重暗山光春意墮微茫小紅嫩緑匀如剪黯無言雲渡澄江沒處與人消遣倚闌情寄斜陽共君今夜舉清觴投老各殊方癡兒官事何時了恨花時潘鬢先霜喚取客帆聊住將予同下瀟湘又再用韻霏霏小雨惱春光煙水更瀰茫昨宵把酒髙歌處任一聲鷄唱清江顦顇杏花如許情懐應似東陽宿酲猶在莫傳觴清悶苦無方幾時玉杵藍橋路約雲英同搗𤣥霜冷落黄昏庭院夢回家在三湘遥天奉翠華引雪消樓外山正秦淮翠藻回瀾香梢豆蔻紅輕猶怕春寒曉光浮畫㦸捲繡簾風煗玉鈎閒紫府仙人花圍羽帔星冠蓬萊閬苑意倦游常戲人間佩麟江左舊都襦袴歌歡只恐催歸覲賸宴都休訴酒盃寛眀嵗應看君鈞容舞袖歌鬟驀山溪建康郡園賞芍藥玉麟春晩緑徧甘棠蔭可是惜花深旋移得翻堦紅影朱簾捲處如在古揚州寶瓔珞玉盤盂嬌豓交相映蓬萊殿裏幾様春風鬢生怕逐朝雲更羅幙重重遮定多情絳蠟常見醉時容縈舞袖簇歌塵莫負良宵永鳳皇臺上憶吹簫陽至節戲呈同官玉管灰飛雲臺珥筆東君飈馭將還又正是霜花巧剪梅粉初乾窈窕紅窗髻影添一線組繡工閒瀟湘好雪意尚遥緑占羣山應思少年壯氣貪遊樂追隨玉勒金鞍更化日舒長嬴得覓醉謀歡去闕桑榆趂煗任從教潘鬢先斑猶狂抂揮翰快寫春寒又再用韻贈黄宰塵暗雙鳬菊眀山徑何妨勌羽知還最好是詩翁醉後瓶罄罍乾一笑東風打耳心無競逺與春閒時闕地覓伴訪梅尋勝登山清時俊材定用看捧詔春郊月露濡鞍況表識買臣貴骨琴瑟逾歡好向玉堂視草金章映萊子衣斑山人去蕙帳夜雨空寒又再用韻詠梅浴雪精神倚風情態百端邀勒春還記舊隠溪橋日暮驛路泥乾曽伴先生蕙帳香細細粉瘦瓊闌傷牢落一夜夢回腸斷家山空教映溪帶月供遊客無情折滿雕鞍便忘了明窗静几筆研同歡莫向髙樓噴笛花似我蓬鬢霜斑都休説今夜倍覺清寒又蠟梅用前韻淺染霓裳輕匀漢額巫山行雨方還最好是肌香蠟瑩蕚嫩紅乾曽見金鐘在列鈞天罷筍簴都閒妖饒似曉鏡乍開緑沁眉山休誇瘦枝疎影湘裙窄一鉤龍麝隨鞍便更做山人倦賞畏冷無歡爭奈氷甌彩筆題詩處珠琲斕斑清宵永相對莫放盃寒蝶戀花次韻張子原尋梅雪壓小橋溪路斷獨立無言霧鬢風鬟亂拂拭氷霜君試看一枝堪寄天涯逺擬向南隣尋酒伴折得花歸醉著歌聲緩姑射夢回星斗轉依然月下重相見清平樂詠橄欖燈毬兒縷金剪綵茸綰同心帶整整雲鬟宜簇戴雪柳閙蛾難賽休誇結實炎州且看指面纎柔試問苦人滋味何如挿鬢風流又忍寒情味枝染薔薇水攬照清溪花影碎笑殺小桃穠李一生占闕春妍偏宜月露娟娟欲寄江南春去亂鵶點破雲牋玉樓春市橋燈火春星碎街鼓催歸人未醉半嗔還笑眼回波去欲更留眉斂翠歸來短燭餘紅淚月淡天髙梅影細北風休遣㕍南來斷送不成今夜睡又次中秋閏月表舅晁仲石韻今秋仲月逢餘閠月姊重來風露静未勞玉斧整蟾宫又見氷輪浮桂影尋常經嵗暌佳景閲月那知還賞詠庾樓江闊碧天髙遥想飛觴清夜永秦樓月與楊君孜月夜泛舟天一色玉盤冷浸瀟湘碧瀟湘碧短亭繫纜隔江聞笛胡床對坐凉生腋通宵説盡狂蹤跡狂蹤跡少年心事老來難得新荷葉金陵府㑹鼔子詞柳幄飛綿風池煗泛新萍燕壘泥香玉麟堂外春深晴雲麗日花濃處蜂蝶紛紛償春一醉管絃聲裏歡聲況是清時錦衣重到臺城故國江山向人依舊多情趂閒行樂休辜負冶葉繁英彤庭歸覲恁時難駐前旌菩薩鬘湖上即事樓前曲浪歸橈急樓中細雨春風濕終日倚危䦨故人湖上山髙情渾似舊只枉東陽瘦薄晚去來休裝成一段愁又小女淑君索賦晩春詞東風吹夢春醒惡瑣忩淡淡花隂薄一夜曲池平小忩雲樣明緑輕眉嬾暈香淺羅衣潤未見海棠開捲簾雙燕來又餞孫莘老江風漠漠寒山碧孤鴻聲裏霜花白畫舸且停橈有人魂欲銷相從能幾日總是天涯客尺素好頻裁休言無雁來又荼䕷東君管盡閒花草紅紅白白知多少末後一奩香緑庭春晝長道人心似海夢冷屏山外莫剪最長條從教玉步揺又東風捲盡欺花雨月明皎紙庭前路月底且論詩從教露濕衣明朝愁入緒各自東歸去後夜月明中緑尊誰與同又朩犀十詠帶月緑帷剪剪黄金碎西風庭院清如水月姊更多情與人無際明濃隂遮玉砌桂影氷壺裏滅燭且徜徉夜深應更香又披風靚粧金翠盈盈晩凝情有恨無人管何處一簾風故人天際逢從教香撲鬢只怕繁華盡牢落正悲秋闕非誰解愁又照溪江梅占盡江頭雪忍寒玉骨誇清絶不似杜秋娘婆娑秋水傍波光涵晩日照影從教宻隠隠認遥黄隔溪十里香又浥露黄昏曽見凌波步無端暝色催人去一夜露華濃香銷蘭菊叢縷金衣易涇莫對西風泣洗盡夜來粧温泉初賜湯又命觴休文多病疎盃酌被花惱得心情惡碧樹又驚秋追歡懐舊遊與君聊一醉醉倒花隂裏斜日下闌干滿身金屑寒又簪髻交刀剪碎瑠璃碧深黄一穂瓏鬆色玉蕊縱妖嬈恐無能樣嬌緑忩初睡起墮馬慵梳髻斜插紫鸞釵香從鬢底來又熏沈黄姑青女交相忌眼看塵土占芳蕊急埽滿䦨金小奩熏水沈博山銀葉透濃馥穿羅袖猶欲問鴻都太真安穏無又來夢午庭栩栩花間蝶翅添金粉穿瓊葉曽見羽衣黄瑤臺淡薄粧醒來魂欲斷摻摻芳英滿夢裏尚偷香何堪秋夜長又寫真霓裳舞罷難留住湘裙緩若輕煙去動是隔年期生綃傳豓姿精神渾似舊碧暗黄金瘦永夜對西窓何縁襟袖香又怨别揉香嗅蕊朝還暮無端却被西風悞底死欲留伊金塵蔌蔌飛茂陵頭已白新聘誰相得耐乆莫相思年年秋與期西江月金鼎香銷沈麝碧梧影轉䦨干可庭明月綺窓閒簾幙低垂不捲一自髙唐人去秋風幾許摧殘拂簷脩竹韻珊珊夢斷山長水逺又贈蔡仲常侍兒初嬌豆蔲梢頭年紀芙容水上精神幼雲嬌玉兩眉春京洛當時風韻金縷深深勸客雕梁蔌蔌飛塵主人從得董雙成應忘瑤池宴飲青玉案東園餞母舅晁閣學鎮臨川東風一夜吹晴雨小園裏春如許桃李無言情難訴陽闗車馬灞橋風月移入江天暮雙旌明日留難住今夕清觴且頻舉咫尺清明三月暮尋芳賓客對花盃酌回首西江路又為外大父林下老人夀年年寓屋稱觴處陪綵綬尊前舞牢落瀟湘歸去未臈梅開遍氷蟾圓後夢斷靈溪路長年厚福天分付算四海今獨步澗竹岩花如舊否與翁相伴嵗寒庭戸儘占閒中趣又戲用賀方回韻餞别朱少章三年牢落荒江路忍明日輕帆去冉冉年光真暗度江山無助風波有險不是留君處梅花萬里傷遲暮驛使來時望佳句我􅂸歸休心已許短篷孤棹緑簔青笠穏泛瀟湘雨昭君怨亦名宴西園晴日烘香花睡花豓浮盃人醉楊柳緑絲風水溶溶留戀芳叢深處嬾上錦韀歸去待得牡丹開更同來四犯令月破輕雲天淡注夜悄花無語莫聽陽關牽離緒􅂸酩酊花深處明日江郊芳草路春逐行人去不似酴醿開獨歩能著意留春住鷓鴣天縣圃約同官賞海棠萬㸃臙脂落日烘坐間酒滿散微紅誰教豓質撩潘鬢生怕朝雲逐楚風尋畫燭照芳容夜深兩行錦燈籠朱唇翠袖休凝竚幾許春情睡思中又蜀錦吳綾剪染成東皇花令一番新風簾不礙尋巢燕雨葉偏禁鬬草人非病酒不闗春恨如芳草思連雲西樓角畔雙桃樹幾許濃苞等露匀又賞芍藥夢想當年姚魏家尊前重見舊時花雙檠分焰交紅影四座春回粲晩霞盃㶑灧帽欹斜夜深絶豓愈清佳天明恐逐行雲去更著重重翠幙遮又送田簿秩滿還霅川只有梅花是故人嵗寒情分更相親紅鸞跨碧江頭路紫府分香月下身君既去我離羣天涯白髪怕逢春西湖蒼莽煙波裏來嵗梅時痛憶君朝中措雙頭芍藥翻堦紅藥競芬芳著意巧成雙須知揚州國豓舊時曽在昭陽盈盈背立同心對綰聮蕚飛香牢貯深沈金屋任教蜨困蜂忙又建康大雪戲呈母舅晁留守漏雲初見六花開驚巧妬江梅飄洒元戎小隊玉粧旌斾歸來恩同化手春回隴畆懽倒尊罍記取明朝登覽緑漪惟有秦淮又謝郭道深恵菊有二小鬟露英雲蕚一般清揉雪更雕瓊預喜重陽登覽大家插帽浮觥分香減翠殷勤逺寄珍重多情不似綺忩雙豓向人解語傾城又依微春緑遍江干煙水小屏寒惆悵雁行南北新詞不忍拈看從今寄取臨風把酒役夢忘餐飛絮落花時候扁舟也到孤山又風簾交翠篆香飄却暑捲輕綃最好佳辰相近夀觴對飲連宵仙翁未老雲中跨鳳臺上吹簫看取他年榮事魚軒入侍塗椒又元夕上潭師劉共甫舍人年來玉帳罷兵籌燈市小遲留花外香隨金勒酒邊人倚紅樓沙堤此去傳柑侍宴天上風流還記月華小隊春風十里潭州又為雲菴夀年年重午近佳辰符艾一番新滿酌九霞竒醖夀君兩鬢長春閨中秀美何如賦得林下精神早辦荆釵布袖共為雲水閒人㸃絳唇金陵府㑹鼓子詞春日遲遲柳絲金淡東風軟緑嬌紅淺簾幙飛新燕玉帳優游嬴得花間宴香塵逺暫停歌扇沈醉深深院又約莫香來倚闌低瞰花如雪怨深愁絶瘦似年時節嵗一相逢常是囱囱别歌壺缺又還吹徹笛裏闗山月蘇武慢湖州趙守席上作暗雨収梅晴波揺桺萬頃水精宫冷橋森畫棟岸列紅樓兩岸翠簾交映天上行舟鑑中開户人在蕊珠仙境況吟煙嘯月彈絲吹竹太平歌詠人盡説銅虎分賢銀潢儲秀鞏固行都藩屏棠隂散暑鼎篆凝香永日一庭虛靜紅袖持觴綵箋揮翰適意酒豪詩俊看飛雲丹詔行沙金勒待公歸覲阮郎歸和邢公玷莫欺騎省鬢邊華曽眠蘇小家綵絲縈腕剪輕霞菖蒲酒更嘉人别後歎飛花雲山和夢遮呉牋小字寫流沙幾行秋雁斜又為邢魯仲小鬟賦美人小字稱春嬌雲鬟玉步揺淡粧濃態楚宫腰梅枝雪未消􅂸惱亂儘妖嬈微窩生臉潮算來虛度可憐宵醉魂誰與招又為張丞夀薰風吹盡不多雲曉天如水清哦松庭院忽聞笙簾疎香篆明蘭玉盛鳳和鳴家聲留漢庭狨鞍長􅅖九重城年年雙鬢青浪淘沙曉日掠輕雲霜瓦鱗鱗大朝山色儼如新家在洞庭南畔住身在江濱華髪照烏巾無意尋春空將兩袖拂飛塵可惜梅花開近路惱盡行人踏莎行壬午元宵戲姜元汝功參議元夕風光中興時候東風著意催梅柳誰家銀字小笙簧倚闌度曲黄昬後撥雪張燈解衣貫酒觚稜金碧聞依舊明年何處看昇平景龍門下燈如晝又約雲菴尋梅雪意初濃雲情已厚黄昬㪚盡扶頭酒不知牆外夜來梅忍寒添得疎花否休更熏香且同擕手從教策䇿輕寒透亭兒直下玉生煙暗香歸去霑襟袖浣溪沙三衢陳釜上作客裏囱囱夢帝州故人相遇一盃休疎梅些子最清幽雙綰香螺春意淺緩歌金縷楚雲留不知粧鏡若為儔又次韻王子弁紅梅倚醉懐春翠黛長肉紅衫子半窺牆蘭湯浴困嬾匀粧應為長年飡絳雪故教丹頰耐清霜弄晴飛馥笑馮唐又次韻杜唐佐秋懐春夢驚回謝氏塘篋中消盡舊家香休文多病怯秋光空對金盤承瑞露竟無玉杵碎𤣥霜醉魂飛度月宫凉眼兒媚效易安體花信風髙雨又收風雨互遲留無端燕子怯寒歸晚閒損簾鈎彈棋打馬心都嬾攛掇上春愁推書就枕鳬煙淡淡蜨夢悠悠漁家傲過盡百花芳草滿柳絲舞困闌干煗柳外秋千裙影亂人逐伴舊家心性如今嬾斗帳寳香凝不散黄昬院落鶯聲晩紅葉不來音信斷疎酒盞東陽痩損無人管又小舟發臨安本是瀟湘漁艇客錢塘江上鋪颿席兩處煙波天一色雲羃羃呉山不似湘山碧休費精神勞夢役鷗鳬難上銅駞陌擾擾紅塵人似織山頭石潮生月落今如昔臨江仙約同官出郊一抹煙林屏樣展輕花岸柳無邊連朝春雨漲平川鼕鼕迎社鼔𣺌𣺌下陂船同事多才饒我嬾乘閒縱飲郊園髻花欹側醉巾偏時豐容卒嵗逰樂更明年又同官招飲席上作失脚青雲何所徃故山松竹應秋癡兒官事幾時休可憐雙白鬢斗粟尚遲留尊酒偷閒聊放曠夜凉河漢西流從教孤笛噴髙樓與君同一醉明日旋分愁柳梢青贈張丞小院輕寒酒濃香軟深沈簾幙我輩相逢歡然一笑春在盃酌家山辜負猿鶴軒冕意秋雲似薄我自西風扁舟歸去看君寥廓又送吕子紹守峽楚天清絶葦岸蘭汀素秋時節簾捲湘鬟香飛雲篆尀看輕别明朝底處闗山算總是愁花恨月白馬江寒黄牛硤靜小梅初徹杏花天豫章重午寳釵整鬢雙鸞鬬睡來醒薰風襟袖綵絲皓腕宜清晝更艾虎衫兒新就玉盃共飲菖蒲酒願耐夏宜春厮守榴花故意紅添皺映得人來越瘦江城子萍鄉王聖俞席上作萍蓬蹤跡幾時休儘飄浮為君留共話當年年少氣横秋莫嘆兩翁俱白髮今古事盡悠悠西風吹夢入江樓故山幽謾回頭又是手遮西日望皇州欲向西湖重載酒君不去與誰遊南歌子為吕聖俞夀菊潤初經雨橙香獨占秋碧琳仙釀試新篘内集熙熙休試蟻浮甌家世傳黄閣功名起黑頭雙鳬聊􅅖故人舟咫尺青雲岐路看英遊瑞鷓鴣送􅄯伯如舅席上作遥天拍水共空明玉鏡開匳特地晴極目秋容無限好舉頭醉眼暫須醒白眉公子催行急碧落仙人著句清後夜蕭蕭葭葦岸一尊獨酌見離情天仙子宴五矦席上作㬉日麗晴春正好楊柳池塘風弄曉露桃雲杏一番新花窈窕香飄緲玉帳靚深聞語笑新賜繡韀花映照須信濃恩春共到漢家飛將乆宣勞迎禁詔瞻天表入衞帝庭常不老醉落魄夜静聞琴銅壺漏歇紗窗倒挂梅梢月玉人酒暈消香雪促軫調絃彈个古離别雛鶯小鳳交飛説嘈嘈軟語丁寜切相如欹枕推紅㲲脉脉無言還記舊時節又梅花似雪雪花却似梅清絶小窗低映梅梢月常記良宵吹酒共攀折如今客裏都休説瀟瀟洒洒情懐别夜闌火冷孤燈滅雪意梅情分付漆園蝶又玉鈎珠箔夜凉庭院天垂幙好風吹動綸巾角羽扇休揮已怯絺衣薄扁舟明日清溪泊歸來依舊情懐惡為君喚月驂鸞鶴天近多寒滿飲金鑿落減字朩蘭花春酲􅂸却鶗鴂一聲花雨落蜜炬紅殘人在青羅歩障間天公薄相慣得柳綿髙百丈綵筆題詩休誦騷人九辨詞鵲橋仙和蔡子周鶴髪蕭森玉顔腴潤養就黄芽金鼎一區松菊老湘濱但心逺何妨人境衮衣家世鳴鸞歌舞到了春氷消盡不須惆悵夢中身這彩選輸贏誰省孏窟詞
